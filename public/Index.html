<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PromptWars Bot | AskAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      border-bottom: 1px solid #00e5ff33;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #00e5ff, #7c4dff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 {
      font-size: 1.3rem;
      background: linear-gradient(90deg, #00e5ff, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    header span {
      font-size: 0.75rem;
      color: #888;
      margin-left: 4px;
    }

    .badge {
      margin-left: auto;
      background: linear-gradient(135deg, #00e5ff22, #7c4dff22);
      border: 1px solid #00e5ff44;
      color: #00e5ff;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
    }

    #chat-container {
      flex: 1;
      width: 100%;
      max-width: 780px;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .user .avatar { background: linear-gradient(135deg, #7c4dff, #00e5ff); }
    .bot .avatar  { background: linear-gradient(135deg, #00e5ff, #00bfa5); }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .user .bubble {
      background: linear-gradient(135deg, #7c4dff, #5c35cc);
      border-bottom-right-radius: 4px;
    }

    .bot .bubble {
      background: #1e1e35;
      border: 1px solid #ffffff11;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #00e5ff;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .input-area {
      width: 100%;
      max-width: 780px;
      padding: 16px;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 30px;
      border: 1px solid #ffffff22;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    #user-input:focus { border-color: #00e5ff55; }

    #send-btn {
      padding: 14px 22px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg, #00e5ff, #7c4dff);
      color: #0f0f1a;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .welcome {
      text-align: center;
      margin: auto;
      opacity: 0.6;
    }
    .welcome h2 { font-size: 1.5rem; margin-bottom: 8px; }
    .welcome p  { font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>PromptWars Bot</h1>
    <span>AskAI</span>
  </div>
  <div class="badge">Powered by Gemini</div>
</header>

<div id="chat-container">
  <div class="welcome">
    <h2>👋 Hey there!</h2>
    <p>I'm AskAI — your Gemini-powered assistant.<br/>Ask me anything to get started.</p>
  </div>
</div>

<div class="input-area">
  <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off"/>
  <button id="send-btn">Send ➤</button>
</div>

<script>
  const chatContainer = document.getElementById("chat-container");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  let conversationHistory = [];

  function addMessage(text, isUser) {
    const welcome = document.querySelector(".welcome");
    if (welcome) welcome.remove();

    const msg = document.createElement("div");
    msg.className = `message ${isUser ? "user" : "bot"}`;
    msg.innerHTML = `
      <div class="avatar">${isUser ? "🧑" : "⚡"}</div>
      <div class="bubble">${text.replace(/\n/g, "<br/>")}</div>
    `;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing";
    div.innerHTML = `
      <div class="avatar">⚡</div>
      <div class="bubble typing-indicator"><span></span><span></span><span></span></div>
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, true);
    conversationHistory.push({ role: "user", parts: [{ text }] });
    userInput.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history: conversationHistory.slice(0, -1) })
      });
      const data = await res.json();
      removeTyping();
      const reply = data.reply || data.error || "Something went wrong.";
      addMessage(reply, false);
      conversationHistory.push({ role: "model", parts: [{ text: reply }] });
    } catch (e) {
      removeTyping();
      addMessage("❌ Network error. Please try again.", false);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
